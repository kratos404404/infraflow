name: InfraFlow CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfiles & Bash
        run: |
          sudo apt-get install -y hadolint shellcheck
          hadolint api-service/Dockerfile web-service/Dockerfile
          shellcheck scripts/deploy.sh

  build:
    needs: lint-and-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/api-service:${{ github.sha }} ./api-service
          docker build -t ghcr.io/${{ github.repository_owner }}/web-service:${{ github.sha }} ./web-service

  security-scan:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/api-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
      - name: Scan web-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/web-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  push:
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push images
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/api-service:${{ github.sha }} ./api-service
          docker build -t ghcr.io/${{ github.repository_owner }}/web-service:${{ github.sha }} ./web-service
          docker push ghcr.io/${{ github.repository_owner }}/api-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/web-service:${{ github.sha }}